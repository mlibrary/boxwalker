---
services:
  app:
    build:
      args:
        INSTALL_DEV_TOOLS: "true"
    command: /bin/sh -lc "while sleep 1000; do :; done"
    tty: true
    stdin_open: true
    # Override the image's production defaults so the dev container runs as a
    # real development environment (installs dev/test gems, uses the dev DB).
    # Merged with the base service's environment (e.g. SOLR_URL is preserved).
    environment:
      - RAILS_ENV=development
      - BUNDLE_DEPLOYMENT=0
      - BUNDLE_WITHOUT=
      # Bundler 4 installs gems under /usr/local/bundle/ruby/<abi>; expose it
      # to plain RubyGems so IDE interpreter checks can find Rails.
      - GEM_PATH=/usr/local/bundle/ruby/3.4.0:/usr/local/lib/ruby/gems/3.4.0
      - PATH=/usr/local/bundle/ruby/3.4.0/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

