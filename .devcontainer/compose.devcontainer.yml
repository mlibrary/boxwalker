---
services:
  app:
    build:
      args:
        INSTALL_DEV_TOOLS: "true"
    command: /bin/sh -lc "while sleep 1000; do :; done"
    tty: true
    stdin_open: true
    # Override the image's production defaults so the dev container runs as a
    # real development environment (installs dev/test gems, uses the dev DB).
    # Merged with the base service's environment (e.g. SOLR_URL is preserved).
    environment:
      - RAILS_ENV=development
      - BUNDLE_DEPLOYMENT=0
      - BUNDLE_WITHOUT=

