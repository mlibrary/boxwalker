---
services:
  app:
    depends_on:
      - solr
    build:
      context: .
    ports:
      - '3000:3000'
    environment:
      - SOLR_URL=http://solr:8983/solr/blacklight-core
    env_file:
      - .env
  solr:
    image: solr:9.7
    volumes:
      - solr-data:/var/solr
      - $PWD/solr/conf:/opt/solr/conf
    ports:
      - '8983:8983'
    entrypoint:
      - docker-entrypoint.sh
      - solr-precreate
      - blacklight-core
      - /opt/solr/conf
    environment:
      - SOLR_JAVA_MEM=-Xms1024m -Xmx1024m
      - SOLR_HEAP=1024m
volumes:
  solr-data:
